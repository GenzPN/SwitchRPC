name: Build SwitchRPC

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install devkitPro packages
      run: |
        dkp-pacman -Syu --noconfirm
        dkp-pacman -S --noconfirm switch-dev switch-curl switch-libjson-c

    - name: Install Swift toolchain
      run: |
        apt-get update
        apt-get install -y curl ca-certificates tar gzip
        curl -fL -o /tmp/swiftly.tar.gz https://download.swift.org/swiftly/linux/swiftly-x86_64.tar.gz
        mkdir -p /tmp/swiftly
        tar -xzf /tmp/swiftly.tar.gz -C /tmp/swiftly
        cd /tmp/swiftly
        yes Y | ./swiftly init --quiet-shell-followup --no-modify-profile
        . "${SWIFTLY_HOME_DIR:-$HOME/.local/share/swiftly}/env.sh"
        swiftly install 6.3.2
        echo "${SWIFTLY_HOME_DIR:-$HOME/.local/share/swiftly}/bin" >> "$GITHUB_PATH"
        swiftc --version

    - name: Build SwitchRPC
      run: |
        make clean
        make all

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SwitchRPC-build
        path: ${{ github.workspace }}/SwitchRPC.zip
        retention-days: 30

    - name: Create Release on Tag
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ github.workspace }}/SwitchRPC.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
